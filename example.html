<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Example Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f1a;
    color: #fff;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 1.5rem;
    text-align: center;
  }
  h1 { font-size: 2rem; color: #7fefc7; }
  p { color: #aaa; max-width: 400px; line-height: 1.6; }
  .box {
    border: 2px dashed #7fefc755;
    padding: 2rem 3rem;
    border-radius: 12px;
  }
</style>
</head>
<body>
  <div class="box">
    <h1>🎮 Example Game</h1>
    <p>Replace the contents of <code>games/example-game/</code> with your real game files. Edit <code>games.json</code> to update the title and description.</p>
  </div>
</body>
</html>
