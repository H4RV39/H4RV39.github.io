<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --surface2: #1a1a2e;
    --border: #ffffff14;
    --accent: #7fefc7;
    --accent2: #a78bfa;
    --text: #f0f0f8;
    --muted: #888899;
    --danger: #ff6b6b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── GRID BG ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── HUB VIEW ─── */
  #hub {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 2.5rem 3rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .logo-icon {
    width: 36px;
    height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 20px; height: 20px; fill: #0a0a12; }

  .logo-text {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo-text span { color: var(--accent); }

  .search-wrap {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.5rem 1rem;
  }

  .search-wrap svg { width: 16px; height: 16px; stroke: var(--muted); flex-shrink: 0; }

  #search {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    width: 220px;
  }

  #search::placeholder { color: var(--muted); }

  main {
    flex: 1;
    padding: 3rem;
  }

  .section-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  /* ─── GAME GRID ─── */
  #game-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 1.25rem;
  }

  .game-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
  }

  .game-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
  }

  .game-card:hover .card-arrow { opacity: 1; transform: translateX(0); }

  .card-thumb {
    height: 130px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    border-bottom: 1px solid var(--border);
    position: relative;
    overflow: hidden;
  }

  .card-thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #7fefc711 0%, #a78bfa11 100%);
  }

  .card-body { padding: 1rem 1.1rem; }

  .card-title {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 0.35rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-desc {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.6rem 1.1rem;
    border-top: 1px solid var(--border);
  }

  .card-tags { display: flex; gap: 0.4rem; flex-wrap: wrap; }

  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    padding: 2px 8px;
    border-radius: 99px;
    background: var(--accent2)22;
    color: var(--accent2);
    border: 1px solid var(--accent2)44;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .card-arrow {
    font-size: 1.1rem;
    color: var(--accent);
    opacity: 0;
    transform: translateX(-4px);
    transition: opacity 0.2s, transform 0.2s;
  }

  /* ─── EMPTY STATE ─── */
  #empty {
    display: none;
    text-align: center;
    padding: 5rem 2rem;
  }
  #empty p { color: var(--muted); margin-top: 0.75rem; }

  /* ─── GAME VIEWER ─── */
  #viewer {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    flex-direction: column;
  }

  #viewer.active { display: flex; }

  .viewer-bar {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 1.5rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  #back-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.4rem 0.9rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.15s, color 0.15s;
  }

  #back-btn:hover { border-color: var(--accent); color: var(--accent); }

  #viewer-title {
    font-size: 1rem;
    font-weight: 700;
    flex: 1;
  }

  #fullscreen-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 0.4rem 0.75rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: border-color 0.15s, color 0.15s;
    font-family: 'Syne', sans-serif;
  }

  #fullscreen-btn:hover { border-color: var(--accent); color: var(--accent); }

  #game-frame {
    flex: 1;
    border: none;
    width: 100%;
    background: #000;
  }

  /* ─── LOADING ─── */
  #loading {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 200;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 1rem;
  }

  #loading.active { display: flex; }

  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  #loading p { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 0.8rem; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    header { padding: 1.5rem; flex-direction: column; gap: 1rem; align-items: flex-start; }
    main { padding: 1.5rem; }
    #search { width: 150px; }
  }
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="spinner"></div>
  <p>launching resource...</p>
</div>

<!-- Hub -->
<div id="hub">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 6H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1zm-10 8H9v2H7v-2H5v-2h2V10h2v2h2v2zm4.5 1a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3-3a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
        </svg>
      </div>
      <span class="logo-text">learning<span>hub</span></span>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input id="search" type="text" placeholder="search games…" autocomplete="off">
    </div>
  </header>

  <main>
    <div class="section-label" id="games-label">// all textbooks</div>
    <div id="game-grid"></div>
    <div id="empty">
      <p style="font-size:2rem">📖</p>
      <p>No textbooks found. Try a different search.</p>
    </div>
  </main>
</div>

<!-- Viewer -->
<div id="viewer">
  <div class="viewer-bar">
    <button id="back-btn" onclick="closeGame()">
      ← back
    </button>
    <span id="viewer-title"></span>
    <button id="fullscreen-btn" onclick="toggleFullscreen()">⛶ fullscreen</button>
  </div>
  <iframe id="game-frame" id="game-frame" allowfullscreen
    allow="fullscreen; autoplay; keyboard-map; gamepad"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-pointer-lock">
  </iframe>
</div>

<script>
  let allGames = [];

  // Emoji fallback thumbnails by tag or index
  const thumbEmoji = ['🎒','✏️','🎯','🧩','📝','🧐','🏫','📇','🖊️''];

  async function loadGames() {
    try {
      const res = await fetch('games.json?v=' + Date.now());
      allGames = await res.json();
      renderGames(allGames);
    } catch (e) {
      document.getElementById('empty').style.display = 'block';
      document.getElementById('empty').querySelector('p:last-child').textContent =
        'Could not load textbooks.json. Make sure it exists in your repo root.';
    }
  }

  function renderGames(games) {
    const grid = document.getElementById('game-grid');
    const empty = document.getElementById('empty');
    const label = document.getElementById('games-label');

    grid.innerHTML = '';

    if (!games.length) {
      empty.style.display = 'block';
      grid.style.display = 'none';
      return;
    }

    empty.style.display = 'none';
    grid.style.display = 'grid';
    label.textContent = `// ${games.length} game${games.length !== 1 ? 's' : ''}`;

    games.forEach((g, i) => {
      const card = document.createElement('div');
      card.className = 'game-card';
      card.onclick = () => launchGame(g);

      const emoji = thumbEmoji[i % thumbEmoji.length];
      const tags = (g.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

      card.innerHTML = `
        <div class="card-thumb">
          ${g.thumbnail
            ? `<img src="${g.thumbnail}" style="width:100%;height:100%;object-fit:cover;position:absolute;inset:0;">`
            : `<span style="position:relative;z-index:1">${emoji}</span>`
          }
        </div>
        <div class="card-body">
          <div class="card-title">${g.title}</div>
          <div class="card-desc">${g.description || 'No description.'}</div>
        </div>
        <div class="card-footer">
          <div class="card-tags">${tags}</div>
          <span class="card-arrow">→</span>
        </div>
      `;
      grid.appendChild(card);
    });
  }

  function launchGame(game) {
    const url = `${game.folder}/${game.entry || 'index.html'}`;
    const loading = document.getElementById('loading');
    const viewer = document.getElementById('viewer');
    const frame = document.getElementById('game-frame');
    const title = document.getElementById('viewer-title');

    loading.classList.add('active');
    title.textContent = game.title;

    frame.onload = () => loading.classList.remove('active');
    frame.src = url;

    document.getElementById('hub').style.display = 'none';
    viewer.classList.add('active');
    document.title = game.title + ' · GameHub';
  }

  function closeGame() {
    const viewer = document.getElementById('viewer');
    const frame = document.getElementById('game-frame');
    viewer.classList.remove('active');
    document.getElementById('hub').style.display = 'flex';
    frame.src = '';
    document.title = 'Game Hub';
  }

  function toggleFullscreen() {
    const frame = document.getElementById('game-frame');
    if (frame.requestFullscreen) frame.requestFullscreen();
    else if (frame.webkitRequestFullscreen) frame.webkitRequestFullscreen();
  }

  // Search
  document.getElementById('search').addEventListener('input', e => {
    const q = e.target.value.toLowerCase().trim();
    if (!q) { renderGames(allGames); return; }
    const filtered = allGames.filter(g =>
      g.title.toLowerCase().includes(q) ||
      (g.description || '').toLowerCase().includes(q) ||
      (g.tags || []).some(t => t.toLowerCase().includes(q))
    );
    renderGames(filtered);
  });

  // Keyboard: Escape to go back
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('viewer').classList.contains('active')) {
      closeGame();
    }
  });

  loadGames();
</script>
</body>
</html>
